<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost Ark Altın Takipçisi</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        h1 { color: #bb86fc; }
        table {
            border-collapse: collapse;
            margin-bottom: 20px;
            background-color: #1e1e1e;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border-radius: 8px;
            overflow: hidden;
        }
        th, td {
            padding: 12px 20px;
            text-align: center;
            border-bottom: 1px solid #333;
        }
        th { background-color: #2c2c2c; color: #fff; }
        .row-total { font-weight: bold; color: #03dac6; }
        .checkbox { accent-color: #bb86fc; transform: scale(1.3); cursor: pointer;}
        
        /* Düzenlenebilir karakter ismi alanı için stil */
        .char-name {
            cursor: pointer;
            border-bottom: 1px dashed #666; /* Düzenlenebilir olduğunu belli eden çizgi */
            transition: 0.3s;
            min-width: 100px;
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
        }
        .char-name:hover {
            background-color: #2c2c2c;
        }
        .char-name:focus {
            outline: none;
            background-color: #333;
            border-bottom: 1px solid #bb86fc;
            color: #fff;
        }

        .summary-box {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            width: 300px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .grand-total {
            font-size: 24px;
            font-weight: bold;
            color: #ffb74d;
            margin-bottom: 20px;
        }
        button {
            background-color: #cf6679;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background-color: #b33951; }
    </style>
</head>
<body>

    <h1>Lost Ark Altın Takipçisi</h1>

    <table>
        <thead>
            <tr>
                <th>Karakter İsmi</th>
                <th>Aegir</th>
                <th>Brel</th>
                <th>Mordum</th>
                <th>Armoche</th>
                <th>Kazeros</th>
                <th>Karakter Altını</th>
            </tr>
        </thead>
        <tbody id="table-body">
            </tbody>
    </table>

    <div class="summary-box">
        <div class="grand-total">Genel Toplam: <span id="grand-total-val">0</span></div>
        <button onclick="manualReset()">Tabloyu Sıfırla</button>
    </div>

    <script>
        const ROWS = 6;
        // Sırasıyla: Aegir, Brel, Mordum, Armoche, Kazeros altını (Varsayılan değerlerinizi korudum)
        const defaultRewards = [21000, 23800, 28000, 22440, 27200];
        const tbody = document.getElementById('table-body');
        
        // Tabloyu DOM'a Çizme
        function renderTable() {
            tbody.innerHTML = '';
            for (let r = 0; r < ROWS; r++) {
                let tr = document.createElement('tr');
                
                // Düzenlenebilir karakter ismi alanı eklendi (contenteditable="true")
                let html = `<td><span class="char-name" id="charName-${r}" contenteditable="true" onblur="saveCharNames()" title="İsmi değiştirmek için tıklayın">Karakter ${r + 1}</span></td>`;
                
                for (let c = 0; c < 5; c++) {
                    html += `<td><input type="checkbox" class="checkbox" data-row="${r}" data-col="${c}"></td>`;
                }
                
                // Bonus (Checker) sütunu kaldırıldı. Sadece satır toplamı kaldı.
                html += `<td class="row-total" id="total-${r}">0</td>`;
                
                tr.innerHTML = html;
                tbody.appendChild(tr);
            }
        }

        // Karakter isimlerini LocalStorage'a kaydetme fonksiyonu
        function saveCharNames() {
            let names = [];
            for (let r = 0; r < ROWS; r++) {
                names.push(document.getElementById(`charName-${r}`).innerText);
            }
            localStorage.setItem('lostArkNames', JSON.stringify(names));
        }

        // Hesaplama ve Arayüzü Güncelleme
        function calculateAndUpdate() {
            let grandTotal = 0;
            let dataState = [];

            for (let r = 0; r < ROWS; r++) {
                let rowTotal = 0;
                let rowData = [];

                // Ödül listesini belirle (İlk karakter için özel kural)
                let currentRewards = [...defaultRewards];
                if (r === 0) { 
                    currentRewards[3] = 28560; // 1. satırın 4. bossu (Armoche) için özel ödül
                }

                // Checkboxları kontrol et
                for (let c = 0; c < 5; c++) {
                    let cb = document.querySelector(`.checkbox[data-row="${r}"][data-col="${c}"]`);
                    let isChecked = cb.checked;
                    rowData.push(isChecked);

                    if (isChecked) {
                        rowTotal += currentRewards[c];
                    }
                }

                dataState.push(rowData);

                // Satır toplamını yaz
                document.getElementById(`total-${r}`).innerText = rowTotal.toLocaleString('tr-TR');
                grandTotal += rowTotal;
            }

            // Genel toplamı yaz
            document.getElementById('grand-total-val').innerText = grandTotal.toLocaleString('tr-TR');
            
            // Tik durumlarını LocalStorage'a kaydet
            localStorage.setItem('lostArkData', JSON.stringify(dataState));
        }

        // Kaydedilmiş veriyi yükleme
        function loadData() {
            // Tikleri Yükle
            let savedData = localStorage.getItem('lostArkData');
            if (savedData) {
                let dataState = JSON.parse(savedData);
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < 5; c++) {
                        let cb = document.querySelector(`.checkbox[data-row="${r}"][data-col="${c}"]`);
                        if(dataState[r] && dataState[r][c]) {
                            cb.checked = true;
                        }
                    }
                }
            }

            // İsimleri Yükle
            let savedNames = localStorage.getItem('lostArkNames');
            if (savedNames) {
                let parsedNames = JSON.parse(savedNames);
                for (let r = 0; r < ROWS; r++) {
                    if(parsedNames[r]) {
                        document.getElementById(`charName-${r}`).innerText = parsedNames[r];
                    }
                }
            }
        }

        // Manuel Sıfırlama
        function manualReset() {
            if(confirm("Haftalık kutuları sıfırlamak istediğinize emin misiniz? (Karakter isimleri silinmez)")) {
                resetAction();
            }
        }

        // Temel Sıfırlama İşlemi
        function resetAction() {
            document.querySelectorAll('.checkbox').forEach(cb => cb.checked = false);
            calculateAndUpdate();
            localStorage.setItem('lastResetTime', new Date().getTime()); 
        }

        // Çarşamba 13:00 Otomatik Sıfırlama Kontrolü
        function checkWeeklyReset() {
            const now = new Date();
            const lastReset = localStorage.getItem('lastResetTime');

            let recentWed = new Date(now);
            recentWed.setHours(13, 0, 0, 0);

            const day = now.getDay(); 
            let daysToSubtract = (day >= 3) ? (day - 3) : (day + 4);
            if (day === 3 && now.getHours() < 13) {
                daysToSubtract = 7;
            }
            recentWed.setDate(now.getDate() - daysToSubtract);

            if (!lastReset || parseInt(lastReset) < recentWed.getTime()) {
                resetAction();
                console.log("Haftalık Çarşamba 13:00 sıfırlaması yapıldı!");
            }
        }

        // Başlangıç Kurulumu
        renderTable();
        loadData();
        checkWeeklyReset();
        calculateAndUpdate();

        // Checkboxlara tıklama olayını ekle
        document.querySelectorAll('.checkbox').forEach(cb => {
            cb.addEventListener('change', calculateAndUpdate);
        });

        // Enter tuşuna basınca alt satıra geçmeyi engellemek için (İsim yazarken)
        document.querySelectorAll('.char-name').forEach(item => {
            item.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    this.blur(); // Odaklanmayı bırak, isim kaydedilsin
                }
            });
        });

    </script>
</body>
</html>
