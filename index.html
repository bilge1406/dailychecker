<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost Ark Altın Takipçisi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0f19;
            background-image: radial-gradient(circle at top right, #1a1625, #0b0f19);
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
            min-height: 100vh;
        }

        h1 { 
            color: #f8fafc; 
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(187, 134, 252, 0.4);
            letter-spacing: -1px;
        }
        h1 span { color: #bb86fc; }
        
        .add-char-box {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            padding: 20px 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            display: flex;
            gap: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }
        
        .add-char-box input, .add-char-box select {
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #334155;
            background-color: #0f172a;
            color: white;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }
        .add-char-box input:focus, .add-char-box select:focus {
            outline: none;
            border-color: #bb86fc;
            box-shadow: 0 0 10px rgba(187, 134, 252, 0.2);
        }

        .add-btn {
            background: linear-gradient(135deg, #03dac6, #00b3a3);
            color: #000;
            font-weight: 800;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-size: 15px;
        }
        .add-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(3, 218, 198, 0.4); }

        table {
            border-collapse: collapse;
            margin-bottom: 30px;
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
            width: 100%;
            max-width: 1050px;
        }

        th, td { padding: 16px 20px; text-align: center; }
        
        th { 
            background-color: rgba(15, 23, 42, 0.8); 
            color: #94a3b8; 
            font-weight: 600;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 1px;
            border-bottom: 1px solid #334155;
        }

        #table-body tr {
            border-bottom: 1px solid rgba(51, 65, 85, 0.5);
            transition: background 0.2s;
        }

        #table-body tr:hover { background-color: rgba(255, 255, 255, 0.03); }

        #table-body tr:nth-child(6) {
            border-bottom: 2px dashed rgba(187, 134, 252, 0.6);
            box-shadow: 0 15px 15px -15px rgba(187, 134, 252, 0.2);
        }

        .row-total { font-weight: 800; color: #03dac6; font-size: 16px; }
        
        .checkbox { 
            accent-color: #bb86fc; 
            transform: scale(1.4); 
            cursor: pointer;
            transition: all 0.2s;
        }
        .checkbox:hover:not(:disabled) {
            transform: scale(1.6);
            filter: drop-shadow(0 0 5px rgba(187,134,252,0.5));
        }
        .checkbox:disabled { cursor: not-allowed; opacity: 0.2; filter: grayscale(100%); }
        
        .char-cell {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            min-width: 280px;
        }
        .char-info-wrapper {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            text-align: left;
        }
        .char-name {
            cursor: text;
            padding: 2px 4px;
            font-weight: 600;
            font-size: 16px;
            color: #f8fafc;
            border-radius: 4px;
            border-bottom: 1px dashed transparent;
            transition: all 0.2s;
            display: inline-block;
            margin-bottom: 4px;
        }
        .char-name:hover { border-bottom: 1px dashed #64748b; background: rgba(255,255,255,0.05); }
        .char-name:focus { outline: none; border-bottom: 1px solid #bb86fc; background: rgba(0,0,0,0.2); }
        
        .box-toggles {
            display: flex;
            gap: 4px;
        }
        .box-toggle {
            display: flex;
            align-items: center;
            gap: 2px;
            font-size: 9px;
            font-weight: 600;
            color: #94a3b8;
            background: rgba(15, 23, 42, 0.6);
            padding: 2px 5px;
            border-radius: 4px;
            border: 1px solid #334155;
            cursor: pointer;
            transition: all 0.2s;
        }
        .box-toggle:hover { border-color: #bb86fc; color: #e2e8f0; }
        .box-toggle input { accent-color: #f59e0b; cursor: pointer; margin: 0; width: 10px; height: 10px; }

        .badge-container {
            display: flex;
            flex-direction: column;
            gap: 5px;
            align-items: flex-end;
        }
        .char-badge {
            font-size: 11px;
            font-weight: 600;
            background-color: #1e293b;
            padding: 4px 8px;
            border-radius: 6px;
            color: #e2e8f0;
            cursor: pointer;
            text-align: center;
            min-width: 50px;
            border: 1px solid #334155;
            transition: all 0.2s;
        }
        .char-badge:hover { background-color: #334155; border-color: #bb86fc; }
        .badge-gs { color: #f59e0b; border-color: rgba(245, 158, 11, 0.3); }
        
        .delete-btn {
            background-color: transparent;
            color: #ef4444;
            border: none;
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
            border-radius: 4px;
            transition: 0.2s;
        }
        .delete-btn:hover { background-color: rgba(239, 68, 68, 0.1); transform: scale(1.1); }

        .status-badge {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 800;
            display: inline-block;
            margin-top: 6px;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .summary-box {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .grand-total {
            font-size: 28px;
            font-weight: 800;
            color: #f59e0b;
            margin-bottom: 25px;
            text-shadow: 0 0 15px rgba(245, 158, 11, 0.3);
        }
        .action-btns { display: flex; flex-direction: column; gap: 12px; }
        .sync-btn {
            background: linear-gradient(135deg, #a855f7, #9333ea);
            color: #fff;
            border: none;
            padding: 12px;
            font-size: 15px;
            font-weight: 800;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
        }
        .sync-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(168, 85, 247, 0.5); }
        
        .reset-btn {
            background: transparent;
            color: #ef4444;
            border: 1px solid #ef4444;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .reset-btn:hover { background: rgba(239, 68, 68, 0.1); }
        
        #sync-status { font-size: 13px; color: #03dac6; margin-top: 15px; min-height: 18px; font-weight: 600; }
    </style>
</head>
<body>

    <h1>Lost Ark <span>Altın</span> Takipçisi</h1>

    <div class="add-char-box">
        <select id="new-region" title="Sunucu Bölgesi">
            <option value="CE">CE (Central)</option>
            <option value="NAE">NAE (East)</option>
            <option value="NAW">NAW (West)</option>
            <option value="SA">SA (South)</option>
        </select>
        <input type="text" id="new-name" placeholder="Karakter İsmi">
        <input type="number" id="new-gs" placeholder="Gearscore (Örn: 1720)">
        <button class="add-btn" onclick="addCharacter()">Karakter Ekle</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Karakter Bilgisi</th>
                <th>Brel</th>
                <th>Mordum</th>
                <th>Armoche</th>
                <th>Kazeros</th>
                <th>Serca</th>
                <th>Karakter Altını</th>
            </tr>
        </thead>
        <tbody id="table-body">
        </tbody>
    </table>

    <div class="summary-box">
        <div class="grand-total">Toplam: <span id="grand-total-val">0</span></div>
        <div class="action-btns">
            <button class="sync-btn" onclick="syncAllLogs()">🔄 Manuel Log Senkronize Et</button>
            <button class="reset-btn" onclick="manualReset()">🗑️ Tüm Tabloyu Sıfırla</button>
        </div>
        <div id="sync-status"></div>
    </div>

    <script>
        let appData = [];
        // Yeni Sıralama: Brel (0), Mordum (1), Armoche (2), Kazeros (3), Serca (4)
        const defaultRewards = [23800, 28000, 0, 0, 0]; 

        function loadData() {
            let saved = localStorage.getItem('lostArkAppData');
            if (saved) {
                appData = JSON.parse(saved);
                appData.forEach(c => { 
                    if(!c.region) c.region = "CE"; 
                    if(typeof c.boxArmoche === 'undefined') c.boxArmoche = true;
                    if(typeof c.boxKazeros === 'undefined') c.boxKazeros = true;
                    
                    // Serca güncellemesi geldiğinde eski tiklerin kaymaması için kutuları sıfırla
                    if(typeof c.boxSerca === 'undefined') {
                        c.boxSerca = true;
                        c.checks = [false, false, false, false, false];
                    }
                });
            } else {
                appData = [
                    { name: "Ana Karakter", region: "CE", gs: 1730, checks: [false, false, false, false, false], boxArmoche: true, boxKazeros: true, boxSerca: true }
                ];
                saveData();
            }
        }

        function saveData() {
            localStorage.setItem('lostArkAppData', JSON.stringify(appData));
        }

        function getLastResetTimestamp() {
            let now = new Date();
            let resetDate = new Date(now);
            resetDate.setHours(13, 0, 0, 0);
            
            let day = now.getDay(); 
            let daysToSubtract = (day >= 3) ? (day - 3) : (day + 4);
            if (day === 3 && now.getHours() < 13) {
                daysToSubtract = 7;
            }
            resetDate.setDate(now.getDate() - daysToSubtract);
            return resetDate.getTime();
        }

        function renderTable() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            let grandTotal = 0;

            appData.forEach((char, r) => {
                let tr = document.createElement('tr');
                
                let nameCell = `
                    <div class="char-cell">
                        <div class="char-info-wrapper">
                            <span class="char-name" contenteditable="true" onblur="updateName(${r}, this.innerText)" title="İsmi değiştir">${char.name}</span>
                            <div class="box-toggles">
                                <label class="box-toggle" title="Armoche">
                                    <input type="checkbox" onchange="toggleBox(${r}, 'armoche', this.checked)" ${char.boxArmoche ? 'checked' : ''}> A.Kutu
                                </label>
                                <label class="box-toggle" title="Kazeros">
                                    <input type="checkbox" onchange="toggleBox(${r}, 'kazeros', this.checked)" ${char.boxKazeros ? 'checked' : ''}> K.Kutu
                                </label>
                                <label class="box-toggle" title="Serca">
                                    <input type="checkbox" onchange="toggleBox(${r}, 'serca', this.checked)" ${char.boxSerca ? 'checked' : ''}> S.Kutu
                                </label>
                            </div>
                        </div>
                        <div class="badge-container">
                            <span class="char-badge" onclick="updateRegion(${r})" title="Bölgeyi değiştir">${char.region}</span>
                            <span class="char-badge badge-gs" onclick="updateGS(${r})" title="GS değiştir">${char.gs} GS</span>
                        </div>
                        <button class="delete-btn" onclick="deleteCharacter(${r})" title="Karakteri Sil">✖</button>
                    </div>
                `;

                let currentRewards = [...defaultRewards];
                
                // --- 2. INDEX: ARMOCHE HESABI (GS Sınırı: 1720) ---
                let armocheBase = (char.gs >= 1720) ? 42000 : 33000;
                let armocheBoxCost = (char.gs >= 1720) ? 13440 : 10560;
                currentRewards[2] = char.boxArmoche ? (armocheBase - armocheBoxCost) : armocheBase;

                // --- 3. INDEX: KAZEROS HESABI (GS Sınırı: 1730) ---
                let kazerosBase = (char.gs >= 1730) ? 52000 : 40000;
                let kazerosBoxCost = (char.gs >= 1730) ? 16640 : 12800;
                currentRewards[3] = char.boxKazeros ? (kazerosBase - kazerosBoxCost) : kazerosBase;

                // --- 4. INDEX: SERCA HESABI (GS Sınırı: 1730) ---
                let sercaBase = (char.gs >= 1730) ? 44000 : 35000;
                let sercaBoxCost = (char.gs >= 1730) ? 14080 : 11200;
                currentRewards[4] = char.boxSerca ? (sercaBase - sercaBoxCost) : sercaBase;

                let checkCells = '';
                let rowTotal = 0;
                let checkedCount = char.checks.filter(isChecked => isChecked === true).length;

                for (let c = 0; c < 5; c++) {
                    let isChecked = char.checks[c];
                    let isDisabled = (!isChecked && checkedCount >= 3) ? 'disabled' : '';

                    checkCells += `<td><input type="checkbox" class="checkbox" id="chk-${r}-${c}" autocomplete="off" ${isChecked ? 'checked' : ''} ${isDisabled} onchange="toggleCheck(${r}, ${c}, this.checked)"></td>`;
                    
                    if (isChecked) rowTotal += currentRewards[c];
                }

                let statusBadgeHTML = checkedCount >= 3 ? `<div class="status-badge">Tamamlandı</div>` : '';

                tr.innerHTML = `
                    <td>${nameCell}</td>
                    ${checkCells}
                    <td class="row-total">
                        <div style="display: flex; flex-direction: column; align-items: center;">
                            <span>${rowTotal.toLocaleString('tr-TR')}</span>
                            ${statusBadgeHTML}
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);

                let rowCheckboxes = tr.querySelectorAll('.checkbox');
                for (let c = 0; c < 5; c++) {
                    rowCheckboxes[c].checked = char.checks[c];
                }

                grandTotal += rowTotal;
            });

            document.getElementById('grand-total-val').innerText = grandTotal.toLocaleString('tr-TR');
            
            document.querySelectorAll('.char-name').forEach(item => {
                item.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') { e.preventDefault(); this.blur(); }
                });
            });
        }

        function toggleBox(r, type, isChecked) {
            if (type === 'armoche') appData[r].boxArmoche = isChecked;
            if (type === 'kazeros') appData[r].boxKazeros = isChecked;
            if (type === 'serca') appData[r].boxSerca = isChecked;
            saveData();
            renderTable();
        }

        function toggleCheck(r, c, isChecked) {
            appData[r].checks[c] = isChecked;
            saveData();
            renderTable();
        }

        function addCharacter() {
            let region = document.getElementById('new-region').value;
            let nameInput = document.getElementById('new-name').value.trim();
            let gsInput = parseInt(document.getElementById('new-gs').value);
            
            if(!nameInput) return alert("Lütfen bir karakter ismi girin!");

            appData.push({ name: nameInput, region: region, gs: gsInput || 1600, checks: [false, false, false, false, false], boxArmoche: true, boxKazeros: true, boxSerca: true });
            
            document.getElementById('new-name').value = '';
            document.getElementById('new-gs').value = '';
            
            saveData();
            renderTable();
        }

        function deleteCharacter(r) {
            if (confirm(`"${appData[r].name}" silinecek. Emin misiniz?`)) {
                appData.splice(r, 1);
                saveData();
                renderTable();
            }
        }

        function updateName(r, newName) { appData[r].name = newName.trim(); saveData(); }
        function updateRegion(r) {
            let newReg = prompt(`${appData[r].name} için yeni bölge (CE, NAW, vb.):`, appData[r].region);
            if(newReg) { appData[r].region = newReg.toUpperCase().trim(); saveData(); renderTable(); }
        }
        function updateGS(r) {
            let newGS = prompt(`${appData[r].name} için yeni GS:`, appData[r].gs);
            if (newGS && !isNaN(newGS)) { appData[r].gs = parseInt(newGS); saveData(); renderTable(); }
        }

        function manualReset() {
            if(confirm("Tüm tikleri sıfırlamak istediğinize emin misiniz?")) resetAction();
        }

        function resetAction() {
            appData.forEach(char => char.checks = [false, false, false, false, false]);
            saveData();
            renderTable();
            localStorage.setItem('lastResetTime', new Date().getTime()); 
        }

// --- 429 KORUMALI AKILLI API SENKRONİZASYONU ---
        async function syncAllLogs() {
            const statusText = document.getElementById('sync-status');
            statusText.style.color = "#f59e0b";
            let updatedCount = 0;
            
            const lastResetTime = getLastResetTimestamp();

            for (let i = 0; i < appData.length; i++) {
                let char = appData[i];
                statusText.innerText = `${char.name} (${char.region}) aranıyor...`;
                
                let targetUrl = `https://lostark.bible/character/${char.region}/${char.name}/logs`;
                let proxyUrl = `https://api.codetabs.com/v1/proxy?quest=${targetUrl}`;

                let success = false;
                let retryCount = 0;

                // 429 hatası alırsak 1 kez daha denemesi için döngü (while) kurduk
                while (!success && retryCount < 2) {
                    try {
                        let response = await fetch(proxyUrl);
                        
                        // Proxy bizi hızdan dolayı engellediyse (429) bilerek hata fırlat
                        if (response.status === 429) {
                            throw new Error("429_RATE_LIMIT");
                        }
                        if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);

                        let pageText = await response.text();
                        
                        if (pageText) {
                            let checkedCount = char.checks.filter(c => c === true).length;
                            let regex = /\{[^}]*boss:"([^"]+)"[^}]*timestamp:(\d+)[^}]*\}/g;
                            let match;

                            while ((match = regex.exec(pageText)) !== null) {
                                let bossName = match[1].toLowerCase();
                                let killTime = parseInt(match[2]);

                                if (killTime > lastResetTime) {
                                    let bossIndex = -1;
                                    
                                    if ((bossName.includes("brelshaza") || bossName.includes("brel")) && !bossName.includes("ember")) bossIndex = 0;
                                    else if (bossName.includes("mordum")) bossIndex = 1;
                                    else if (bossName.includes("armoche")) bossIndex = 2;
                                    else if (bossName.includes("kazeros")) bossIndex = 3;
                                    else if (bossName.includes("serca")) bossIndex = 4;

                                    if (bossIndex !== -1 && !char.checks[bossIndex] && checkedCount < 3) {
                                        char.checks[bossIndex] = true;
                                        checkedCount++;
                                        updatedCount++;
                                    }
                                }
                            }
                            success = true; // Başarıyla okundu, döngüden çık
                        }
                    } catch (error) {
                        if (error.message === "429_RATE_LIMIT") {
                            retryCount++;
                            statusText.innerText = `⏳ Çok hızlı gittik... 5sn mola! (${char.name} tekrar deneniyor)`;
                            // Ceza molası: 5 saniye bekle ve aynı karakteri tekrar dene
                            await new Promise(resolve => setTimeout(resolve, 5000));
                        } else {
                            console.error("Senkronizasyon hatası:", error);
                            break; // 429 dışı (çökme vb.) bir hataysa bu karakteri atla
                        }
                    }
                }

                // Diğer karaktere geçmeden önce bekleme süresini 1.5'ten 3 saniyeye çıkardık
                await new Promise(resolve => setTimeout(resolve, 3000));
            }

            if (updatedCount > 0) {
                saveData();
                renderTable();
            }

            statusText.style.color = "#10b981";
            statusText.innerText = updatedCount > 0 
                ? `✅ Oto-Sync: Bu haftaya ait ${updatedCount} yeni raid onaylandı.` 
                : `✅ Oto-Sync: Tarama bitti, yeni raid yok.`;

            setTimeout(() => { statusText.innerText = ''; }, 5000);
        }
        
        function checkWeeklyReset() {
            const now = new Date();
            const lastReset = localStorage.getItem('lastResetTime');
            const recentWedTime = getLastResetTimestamp();

            if (!lastReset || parseInt(lastReset) < recentWedTime) {
                resetAction();
                console.log("Haftalık Çarşamba 13:00 sıfırlaması yapıldı!");
            }
        }

        // --- BAŞLATMA ---
        loadData();
        checkWeeklyReset();
        renderTable();

        setTimeout(syncAllLogs, 5000);
        setInterval(syncAllLogs, 15 * 60 * 1000);

    </script>
</body>
</html>
